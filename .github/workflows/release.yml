name: Build, Sign and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  APP_NAME: 'winAlert'
  INNO_VERSION: '6.2.2'

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore src/winAlert/winAlert.csproj

      - name: Build and Publish Self-Contained
        run: |
          dotnet publish src/winAlert/winAlert.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:PublishReadyToRun=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o ./publish
        env:
          DOTNET_CLI_TELEMETRY_OPTOUT: '1'

      - name: List Published Files
        run: |
          ls -la publish/
          du -sh publish/

      # Build Inno Setup Installer
      - name: Download Inno Setup
        run: |
          $innoUrl = "https://files.jrsoftware.org/is/6/innosetup-${{ env.INNO_VERSION }}-setup.exe"
          Write-Host "Downloading Inno Setup from: $innoUrl"
          Invoke-WebRequest -Uri $innoUrl -OutFile innosetup-setup.exe

      - name: Install Inno Setup
        run: |
          Start-Process -FilePath ".\innosetup-setup.exe" -ArgumentList "/VERYSILENT", "/SUPPRESSMSGBOXES", "/NORESTART" -Wait
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" --version

      - name: Build Installer
        run: |
          mkdir -p dist
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer/winAlert.iss

      - name: List Dist Files
        run: ls -la dist/

      # ============================================================
      # SELF-SIGNED CERTIFICATE (for testing/internal use)
      # ============================================================
      # Creates a self-signed code signing certificate, exports to PFX,
      # and signs the installer. Will show "Unknown Publisher" warnings.
      # ============================================================

      - name: Create Self-Signed Certificate
        run: |
          # Create self-signed code signing certificate
          $cert = New-SelfSignedCertificate `
            -Type CodeSigningCert `
            -Subject "CN=winAlert Developer" `
            -KeyUsage DigitalSignature `
            -KeyAlgorithm RSA `
            -KeyLength 2048 `
            -CertStoreLocation "Cert:\CurrentUser\My" `
            -NotAfter (Get-Date).AddYears(5)

          Write-Host "Certificate created: $($cert.Thumbprint)"

          # Export to PFX with password
          $pwd = ConvertTo-SecureString -String "winAlert2026!" -Force -AsPlainText
          $certPath = "$env:TEMP\winAlert-signing.pfx"
          Export-PfxCertificate -Cert $cert -Password $pwd -FilePath $certPath | Out-Null
          Write-Host "Exported to: $certPath"

          # Store thumbprint for SignTool
          Write-Host "CERT_THUMBPRINT=$($cert.Thumbprint)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8

      - name: Sign Installer with Self-Signed Certificate
        run: |
          $certPath = "$env:TEMP\winAlert-signing.pfx"
          $pwd = "winAlert2026!"
          $exe = Get-ChildItem -Path dist -Filter "*.exe" | Select-Object -First 1

          Write-Host "Signing: $($exe.FullName)"

          # Use Windows SDK signtool
          & "C:\Program Files (x86)\Windows Kits\10\bin\10.0.22621.0\x64\signtool.exe" sign /
            /f $certPath /
            /p "$pwd" /
            /fd SHA256 /
            /tr http://timestamp.digicert.com /
            /td SHA256 /
            $exe.FullName

          Write-Host "Signing complete"

      - name: Verify Signature
        run: |
          $exe = Get-ChildItem -Path dist -Filter "*.exe" | Select-Object -First 1
          Write-Host "Verifying signature for: $($exe.FullName)"
          & "C:\Program Files (x86)\Windows Kits\10\bin\10.0.22621.0\x64\signtool.exe" verify /pa /v $exe.FullName

      # Create GitHub Release
      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/*.exe
            publish/winAlert.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Signature (if signed)
        if: always()
        run: |
          $exe = Get-ChildItem -Path dist -Filter "*.exe" | Select-Object -First 1
          if ($exe) {
            Write-Host "Checking signature for: $($exe.FullName)"
            & "C:\Program Files (x86)\Windows Kits\10\bin\10.0.22621.0\x64\signtool.exe" verify /pa /v $exe.FullName 2>&1 || Write-Host "No valid signature found (expected if not yet signed)"
          }
